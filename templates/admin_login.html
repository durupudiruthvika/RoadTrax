{% extends "base.html" %}
{% block content %}
<div class="page-gradient">
    <div class="container" style="max-width: 500px;">
        <div class="clay-card" style="padding: 3rem; text-align: center;">
            <div style="font-size: 3rem; color: var(--primary); margin-bottom: 1rem;">
                <i class='bx bxs-lock-alt'></i>
            </div>
            <h2 style="margin-bottom: 0.5rem;">Admin Access</h2>
            <p style="color: var(--text-dim); margin-bottom: 2rem;">Please enter your credentials to access the monitoring panel.</p>

            <form action="{{ url_for('admin_login') }}" method="POST" style="text-align: left;">
                <div style="margin-bottom: 1.5rem;">
                    <label style="display: block; color: var(--text-light); margin-bottom: 0.5rem; font-size: 0.9rem;">Username</label>
                    <input type="text" name="username" required 
                        style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: white; outline: none;">
                </div>
                <div style="margin-bottom: 2rem;">
                    <label style="display: block; color: var(--text-light); margin-bottom: 0.5rem; font-size: 0.9rem;">Password</label>
                    <input type="password" name="password" required 
                        style="width: 100%; padding: 1rem; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); border-radius: 12px; color: white; outline: none;">
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 1rem;">
                    Login to Dashboard
                </button>
            </form>
            
            <div style="margin-top: 2rem;">
                <a href="{{ url_for('login') }}" style="color: var(--text-dim); font-size: 0.9rem; text-decoration: none;">
                    <i class='bx bx-user'></i> Are you a normal user?
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
