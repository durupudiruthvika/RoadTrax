{% extends 'base.html' %}

{% block content %}
<div class="landing-wrapper" style="min-height: 80vh; padding-top: 4rem;">
    <!-- Blob for subtle background interest -->
    <div class="blob blob-1" style="opacity: 0.3;"></div>

    <div class="clay-card" style="width: 100%; max-width: 400px; margin: 0 auto; padding: 3rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="margin-bottom: 0.5rem;">Welcome Back</h2>
            <p style="color: var(--text-gray);">Enter your credentials to access the dashboard.</p>
        </div>

        <div id="g_id_onload"
             data-client_id="{{ google_client_id }}"
             data-context="signin"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false"
             data-itp_support="true">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signin_with"
             data-size="large"
             data-logo_alignment="left"
             style="display: flex; justify-content: center;">
        </div>

        <script src="https://accounts.google.com/gsi/client" async defer></script>
        <script>
            console.log("Current Origin:", window.location.origin);
            console.log("Google Client ID:", "{{ google_client_id }}");

            function handleCredentialResponse(response) {
                fetch('/google_login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        window.location.href = '/detect';
                    } else {
                        alert('Google Sign-In failed: ' + (data.error || 'Unknown Error'));
                    }
                })
                .catch(err => console.error('Error during Google Sign-In:', err));
            }
        </script>
        
        <div style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: var(--text-gray);">
            New to RoadSafe? <a href="{{ url_for('signup') }}" style="color: var(--primary); font-weight: 600;">Create Account</a>
        </div>

        <div style="text-align: center; margin-top: 1.5rem; border-top: 1px solid var(--glass-border); padding-top: 1.5rem;">
            <a href="{{ url_for('admin_login') }}" style="color: var(--text-dim); text-decoration: none; font-size: 0.85rem;">
                <i class='bx bxs-lock-alt'></i> Admin Login
            </a>
        </div>
    </div>
</div>
{% endblock %}
