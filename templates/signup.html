{% extends 'base.html' %}

{% block content %}
<div class="landing-wrapper" style="min-height: 80vh; padding-top: 4rem;">
    <!-- Blob for subtle background interest -->
    <div class="blob blob-2" style="opacity: 0.3;"></div>

    <div class="clay-card" style="width: 100%; max-width: 400px; margin: 0 auto; padding: 3rem;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <h2 style="margin-bottom: 0.5rem;">Get Started</h2>
            <p style="color: var(--text-gray);">Create your account for free.</p>
        </div>


        <div id="g_id_onload"
             data-client_id="{{ google_client_id }}"
             data-context="signup"
             data-ux_mode="popup"
             data-callback="handleCredentialResponse"
             data-auto_prompt="false">
        </div>
        <div class="g_id_signin"
             data-type="standard"
             data-shape="rectangular"
             data-theme="outline"
             data-text="signup_with"
             data-size="large"
             data-logo_alignment="left"
             style="display: flex; justify-content: center;">
        </div>

        <script src="https://accounts.google.com/gsi/client" async defer></script>
        <script>
            function handleCredentialResponse(response) {
                fetch('/google_login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ credential: response.credential })
                })
                .then(res => res.json())
                .then(data => {
                    if (data.status === 'success') {
                        window.location.href = '/detect';
                    } else {
                        alert('Google Sign-Up failed.');
                    }
                })
                .catch(err => console.error('Error during Google Sign-Up:', err));
            }
        </script>

        <div style="text-align: center; margin-top: 2rem; font-size: 0.9rem; color: var(--text-gray);">
            Already have an account? <a href="{{ url_for('login') }}"
                style="color: var(--primary); font-weight: 600;">Log In</a>
        </div>
    </div>
</div>
{% endblock %}
